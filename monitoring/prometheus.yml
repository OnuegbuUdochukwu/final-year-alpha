global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'nlp-service'
    static_configs:
      - targets: ['nlp-service:8000']
    metrics_path: '/metrics'

  - job_name: 'graph-service'
    static_configs:
      - targets: ['graph-service:8001']
    metrics_path: '/metrics'

  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:8080']
    metrics_path: '/metrics'
