services:
  # ─── NLP Service ────────────────────────────────────────────────────────────
  - type: web
    name: fyp-nlp
    runtime: docker
    dockerContext: ./nlp-service
    dockerfilePath: Dockerfile
    plan: free
    region: oregon
    envVars:
      - key: PORT
        value: 8000
      - fromGroup: fyp-shared-secrets

  # ─── Graph / Pathfinder Service ─────────────────────────────────────────────
  - type: web
    name: fyp-graph
    runtime: docker
    dockerContext: ./graph-service
    dockerfilePath: Dockerfile
    plan: free
    region: oregon
    envVars:
      - key: PORT
        value: 8001
      - fromGroup: fyp-shared-secrets

  # ─── API Gateway ────────────────────────────────────────────────────────────
  - type: web
    name: fyp-gateway
    runtime: docker
    dockerContext: ./api-gateway
    dockerfilePath: Dockerfile
    plan: free
    region: oregon
    envVars:
      - key: PORT
        value: 8080
      - key: NLP_SERVICE_URL
        value: http://fyp-nlp:8000
      - key: GRAPH_SERVICE_URL
        value: http://fyp-graph:8001
      - key: ALLOWED_ORIGINS
        fromService:
          type: web
          name: fyp-frontend
          property: url
      - fromGroup: fyp-shared-secrets

  # ─── Frontend ───────────────────────────────────────────────────────────────
  - type: web
    name: fyp-frontend
    runtime: docker
    dockerContext: ./frontend
    dockerfilePath: Dockerfile
    plan: free
    region: oregon
    envVars:
      - key: PORT
        value: 80
    dockerBuildArgs:
      - key: VITE_GATEWAY_URL
        fromService:
          type: web
          name: fyp-gateway
          property: url

envVarGroups:
  - name: fyp-shared-secrets
    envVars:
      - key: JWT_SECRET
      - key: NEO4J_URI
      - key: NEO4J_USER
      - key: NEO4J_PASSWORD
      - key: SUPABASE_PG_URL
