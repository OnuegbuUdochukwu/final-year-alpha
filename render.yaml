# Render Blueprint Configuration
services:
  - type: pserv
    name: fyp-nlp
    runtime: docker
    rootDir: nlp-service
    dockerfilePath: Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: PORT
        value: 8000
      - fromGroup: fyp-shared-secrets

  - type: pserv
    name: fyp-graph
    runtime: docker
    rootDir: graph-service
    dockerfilePath: Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: PORT
        value: 8001
      - fromGroup: fyp-shared-secrets

  - type: web
    name: fyp-gateway
    runtime: docker
    rootDir: api-gateway
    dockerfilePath: Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: NLP_SERVICE_URL
        value: http://fyp-nlp:8000
      - key: GRAPH_SERVICE_URL
        value: http://fyp-graph:8001
      - key: ALLOWED_ORIGINS
        value: http://localhost:5173,https://fyp-frontend.onrender.com,https://fyp-frontend-it80.onrender.com
      - fromGroup: fyp-shared-secrets

  - type: web
    name: fyp-frontend
    runtime: docker
    dockerfilePath: frontend/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: PORT
        value: 80
      - key: VITE_GATEWAY_URL
        value: https://fyp-gateway.onrender.com

envVarGroups:
  - name: fyp-shared-secrets
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: SUPABASE_PG_URL
        sync: false
