# Render Blueprint Configuration
services:
  - type: web
    name: fyp-nlp
    runtime: docker
    dockerfilePath: nlp-service/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: PORT
        value: 8000
      - fromGroup: fyp-shared-secrets

  - type: web
    name: fyp-graph
    runtime: docker
    dockerfilePath: graph-service/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: PORT
        value: 8001
      - fromGroup: fyp-shared-secrets

  - type: web
    name: fyp-gateway
    runtime: docker
    dockerfilePath: api-gateway/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: NLP_SERVICE_URL
        fromService:
          name: fyp-nlp
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: GRAPH_SERVICE_URL
        fromService:
          name: fyp-graph
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: ALLOWED_ORIGINS
        value: http://localhost:5173,https://fyp-frontend.onrender.com,https://fyp-frontend-it80.onrender.com
      - fromGroup: fyp-shared-secrets

  - type: web
    name: fyp-frontend
    runtime: docker
    dockerfilePath: frontend/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: PORT
        value: 80
    buildArgs:
      # VITE_* vars must be build args — Vite bakes them in at build time,
      # not runtime, so they cannot be passed as container env vars.
      - key: VITE_GATEWAY_URL
        value: https://fyp-gateway.onrender.com

envVarGroups:
  - name: fyp-shared-secrets
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USERNAME
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: NEO4J_DATABASE
        sync: false
      - key: SUPABASE_PG_URL
        sync: false
      - key: HF_TOKEN
        sync: false
